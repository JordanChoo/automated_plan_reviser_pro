name: template-workflow
description: Workflow with template blocks

documents:
  readme: README.md
  spec: SPECIFICATION.md
  implementation: IMPLEMENTATION.md

api:
  model: "gpt-5.5"
  reasoning_effort: high

rounds:
  output_dir: .apr/rounds/template

template: |
  First, read the README section in the APR review bundle.

  Now read the specification section in the APR review bundle.

  Please analyze and provide feedback on this specification.
  Focus on:
  1. Completeness
  2. Clarity
  3. Technical feasibility

template_with_impl: |
  First, read the README section in the APR review bundle.

  Now read the specification section in the APR review bundle.

  And read the current implementation section in the APR review bundle.

  Please analyze the implementation against the specification.
  Focus on:
  1. Specification compliance
  2. Code quality
  3. Missing features
